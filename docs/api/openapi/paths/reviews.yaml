listProblemReviews:
  get:
    tags: [Reviews]
    summary: List the user's Problem Reviews, grouped for the Review Queue (FR-008)
    parameters:
      - $ref: "../components/parameters.yaml#/ReviewStatusFilterParam"
      - name: due
        in: query
        required: false
        schema:
          type: string
          enum: [overdue, today, tomorrow, this-week]
        description: Groups matching the Review Queue buckets defined in FR-008.
      - $ref: "../components/parameters.yaml#/LimitParam"
      - $ref: "../components/parameters.yaml#/OffsetParam"
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items: { $ref: "../components/schemas.yaml#/ProblemReview" }
                pagination: { $ref: "../components/schemas.yaml#/Pagination" }

getProblemReview:
  get:
    tags: [Reviews]
    summary: Get a single Problem Review, including its Review history
    parameters:
      - $ref: "../components/parameters.yaml#/IdPathParam"
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas.yaml#/ProblemReview"
                - type: object
                  properties:
                    history:
                      type: array
                      items: { $ref: "../components/schemas.yaml#/Review" }
      "404":
        $ref: "../components/responses.yaml#/NotFound"

logReview:
  post:
    tags: [Reviews]
    summary: Log a review outcome, updating the schedule (BR-002, BR-003)
    parameters:
      - $ref: "../components/parameters.yaml#/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [result]
            properties:
              result: { type: string, enum: [success, failed] }
    responses:
      "201":
        description: >
          Review logged. On success, interval increases; on failure,
          retention level decreases (BR-003). nextReviewDate is never set
          before the last recorded review (BR-002).
        content:
          application/json:
            schema: { $ref: "../components/schemas.yaml#/ProblemReview" }
      "404":
        $ref: "../components/responses.yaml#/NotFound"

updateProblemReview:
  patch:
    tags: [Reviews]
    summary: Postpone or reset a Problem Review's schedule
    parameters:
      - $ref: "../components/parameters.yaml#/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              action: { type: string, enum: [postpone, reset] }
              nextReviewDate:
                type: string
                format: date
                description: Required when action is "postpone".
    responses:
      "200":
        description: >
          Updated. "postpone" changes nextReviewDate without logging a
          Review event; "reset" returns interval and retentionLevel to
          their base state.
        content:
          application/json:
            schema: { $ref: "../components/schemas.yaml#/ProblemReview" }
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
