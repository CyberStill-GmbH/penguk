NotFound:
  description: The requested resource does not exist.
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/Error"

Unauthorized:
  description: Missing, invalid, or expired access token.
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/Error"

Forbidden:
  description: Authenticated, but not allowed to access this resource.
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/Error"

Conflict:
  description: The request conflicts with the current state of the resource.
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/Error"

ValidationError:
  description: The request is well-formed but fails validation or a business rule.
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/Error"

RateLimited:
  description: Too many requests; retry after the interval in the Retry-After header.
  headers:
    Retry-After:
      schema:
        type: integer
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/Error"

UpstreamUnavailable:
  description: A dependent external platform is unreachable; safe to retry with backoff.
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/Error"
